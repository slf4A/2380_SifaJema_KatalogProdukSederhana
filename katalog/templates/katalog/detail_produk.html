<!DOCTYPE html>
<html>
<head>
    <title>Detail Produk</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .navbar {
            background-color: #7a1f1f;
            padding: 20px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .box {
            width: 60%;
            margin: 80px auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
        }

        .harga {
            color: #7a1f1f;
            font-weight: bold;
            font-size: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #7a1f1f;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>

</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/produk/">Produk</a>
    <a href="/kontak/">Kontak</a>
</div>

<div class="box">
    
<img 
    src="{{ produk.gambar }}"
    width="100%"
    style="border-radius:10px; margin-bottom:20px;"
>

<h1>{{ produk.nama }}</h1>

<p class="harga">{{ produk.harga }}</p>

<p>{{ produk.deskripsi }}</p>

<a href="/produk/" class="btn">Kembali</a>

</div>

</body>
</html>
