<!DOCTYPE html>
<html>
<head>
    <title>Daftar Produk</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .navbar {
            background-color: #7a1f1f;
            padding: 20px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .harga {
            color: #7a1f1f;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #7a1f1f;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>

</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/produk/">Produk</a>
    <a href="/kontak/">Kontak</a>
</div>

<h1>Daftar Produk</h1>

<div class="container">

{% for p in produk %}

<div class="card">

    <img 
        src="{{ p.gambar }}"
        width="100%"
        style="border-radius:8px;"
    >

    <h2>{{ p.nama }}</h2>

    <p class="harga">{{ p.harga }}</p>

    <a href="/produk/{{ p.id }}/" class="btn">
        Detail Produk
    </a>

</div>

{% endfor %}

</div>

</body>
</html>
